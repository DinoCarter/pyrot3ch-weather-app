<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PYROT3CH Weather</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <h1>PYROT3CH<span class="brand-accent">Weather</span></h1>
    <p id="header-site-info" class="header-site-info"></p>
  </header>

  <main>

    <!-- Input panel -->
    <section class="panel" aria-label="Show location and time">
      <div class="field-row">
        <div class="field">
          <label for="lat-input">Latitude</label>
          <input type="number" id="lat-input" step="any" min="-90" max="90" placeholder="e.g. 39.7392" />
        </div>
        <div class="field">
          <label for="lon-input">Longitude</label>
          <input type="number" id="lon-input" step="any" min="-180" max="180" placeholder="e.g. -104.9903" />
        </div>
      </div>

      <button type="button" id="geolocate-btn" class="btn btn-secondary">Use my location</button>

      <div class="field">
        <label for="datetime-input">Show date &amp; time</label>
        <input type="datetime-local" id="datetime-input" />
      </div>

      <button type="button" id="check-btn" class="btn btn-primary">Check conditions</button>

      <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    </section>

    <!-- Verdict banner -->
    <section id="verdict-banner" class="verdict-banner verdict-hidden" aria-live="polite">
      <div class="verdict-headline" id="verdict-headline"></div>
      <div class="verdict-sentence" id="verdict-sentence"></div>
      <div class="verdict-reason" id="verdict-reason"></div>
      <div class="verdict-note" id="verdict-note"></div>
    </section>

    <!-- Active alerts -->
    <section id="alerts-row" class="alerts-row" hidden>
      <h2 class="section-label">Active alerts</h2>
      <div id="alerts-chips" class="alerts-chips"></div>
    </section>

    <!-- Metric grid -->
    <section id="metric-section" class="metric-section" hidden>
      <h2 class="section-label">Conditions</h2>
      <div id="metric-grid" class="metric-grid"></div>
    </section>

    <!-- Advisory notes -->
    <section id="advisories-section" class="advisories-section" hidden>
      <h2 class="section-label">Things to watch</h2>
      <ul id="advisories-list" class="advisories-list"></ul>
    </section>

    <!-- Hourly strip -->
    <section id="hourly-section" class="hourly-section" hidden>
      <h2 class="section-label">Wind trend</h2>
      <div id="hourly-strip" class="hourly-strip"></div>
    </section>

    <!-- NWS supplementary readings -->
    <section id="nws-supplement-section" class="nws-supplement-section" hidden>
      <h2 class="section-label" id="nws-supplement-label">NWS reference</h2>
      <div id="nws-supplement" class="nws-supplement"></div>
    </section>

  </main>

  <footer class="app-footer">
    <p id="footer-coords"></p>
    <p id="footer-elevation"></p>
    <p id="footer-updated"></p>
    <p class="footer-credit">
      Weather data: <a href="https://www.weather.gov/" target="_blank" rel="noopener">National Weather Service</a>
      and <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a>.
    </p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/cache.js"></script>
  <script src="js/api.js"></script>
  <script src="js/verdict.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
